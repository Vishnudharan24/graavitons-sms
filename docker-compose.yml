version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: graavitons_postgres
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - graavitons-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    build: ./backend
    container_name: graavitons_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    expose:
      - "8000"
    networks:
      - graavitons-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./database:/app/database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 30
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: graavitons_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - graavitons-network

networks:
  graavitons-network:
    external: true

volumes:
  postgres_data:
