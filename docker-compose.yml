services:
  postgres:
    image: postgres:17-alpine
    container_name: graavitons_postgres
    restart: always
    environment:
      POSTGRES_USER: graavitons
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: graavitons_sms
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - graavitons-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graavitons -d graavitons_sms"]
      interval: 15s
      timeout: 10s
      retries: 30

  backend:
    build: ./backend
    container_name: graavitons_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - graavitons-network
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 30
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ""
    container_name: graavitons_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - graavitons-network

networks:
  graavitons-network:
    driver: bridge

volumes:
  postgres_data:
