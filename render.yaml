services:
  - type: web
    name: graavitons-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: CORS_ORIGINS
        fromService:
          name: graavitons-web
          type: web
          property: host
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false

  - type: web
    name: graavitons-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        fromService:
          name: graavitons-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

